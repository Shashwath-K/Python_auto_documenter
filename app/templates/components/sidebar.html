<aside class="sidebar-wrapper collapsed" id="sidebarWrapper">
    <button class="sidebar-toggle-btn" id="sidebarToggleBtn" aria-label="Toggle Sidebar" title="Toggle Sidebar">
        <span class="sidebar-toggle-icon">▶</span>
    </button>
    <div class="sidebar-right">

        <div class="sidebar-widget language-widget">
            <h3 class="widget-title">Programming Language</h3>
            <div class="card widget-card">
                <div class="language-content">
                    <span class="language-icon" id="uiLanguageIcon">🐍</span>
                    <div class="language-info">
                        <p class="language-name" id="uiLanguageName">Python</p>
                        <p class="language-details" id="uiLanguageDetails">Auto-detected</p>
                    </div>
                </div>
            </div>
        </div>


        {% block sidebar_extra %}{% endblock %}

        <div class="sidebar-widget ai-assistant-widget">
            <h3 class="widget-title">AI Assistant</h3>
            <div class="card widget-card assistant-card">
                <div id="aiExplanationContent" class="assistant-content">
                    Highlight code in the editor, right-click, and select "Explain Code..." to see AI analysis here.
                </div>
                <div id="aiLoadingIndicator" class="assistant-loading">
                    <svg class="spinner" viewBox="0 0 50 50">
                        <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                    </svg>
                    Analyzing code...
                </div>
            </div>
        </div>
    </div>
</aside>

<script>
    // Remove "collapsed" default if it was hard-coded in the HTML structure so it syncs properly
    const sidebar = document.getElementById('sidebarWrapper');
    const layoutBody = document.querySelector('.layout-body');

    // Check initial state incase it was set by other files
    if (sidebar.classList.contains('collapsed')) {
        layoutBody.classList.add('sidebar-collapsed');
    }

    document.getElementById('sidebarToggleBtn').addEventListener('click', function () {
        sidebar.classList.toggle('collapsed');
        layoutBody.classList.toggle('sidebar-collapsed');
    });
</script>
